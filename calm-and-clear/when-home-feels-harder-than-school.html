<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>When Home Feels Harder Than School | Calm &amp; Clear</title>

  <meta
    name="description"
    content="A Calm &amp; Clear blog post from NeuroVibe about why autistic children may appear regulated at school and deeply dysregulated at home."
  />

  <link rel="stylesheet" href="/style.css" />

  <style>
    .cc-post-wrap{
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 16px 72px;
    }

    .cc-post-card{
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(150,120,220,0.16);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(80, 55, 140, 0.08);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .cc-post-hero{
      padding: 18px;
      background: linear-gradient(180deg, rgba(244,239,255,0.9) 0%, rgba(255,255,255,0.95) 100%);
      border-bottom: 1px solid rgba(150,120,220,0.14);
    }

    .cc-post-hero img{
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      object-fit: cover;
    }

    .cc-post-body{
      padding: 34px 24px 40px;
    }

    .cc-post-kicker{
      display: inline-block;
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7a5cc9;
    }

    .cc-post-title{
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.12;
      color: #2f2348;
    }

    .cc-post-subtitle{
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #5f5677;
    }

    .cc-post-meta{
      margin: 0 0 28px;
      font-size: 0.95rem;
      color: #7a748f;
    }

    .cc-post-body h2{
      margin: 34px 0 14px;
      font-size: 1.45rem;
      line-height: 1.3;
      color: #39285f;
    }

    .cc-post-body p{
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: #403a4f;
    }

    .cc-post-body ul{
      margin: 0 0 20px 22px;
      padding: 0;
      color: #403a4f;
    }

    .cc-post-body li{
      margin-bottom: 10px;
      line-height: 1.8;
    }

    .cc-post-highlight{
      margin: 28px 0;
      padding: 20px 22px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(243,236,255,0.95), rgba(236,245,255,0.95));
      border: 1px solid rgba(140,108,215,0.14);
    }

    .cc-post-highlight p{
      margin: 0;
      font-size: 1.08rem;
      font-weight: 600;
      color: #443264;
    }

    .cc-post-closing{
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(150,120,220,0.16);
    }

    .cc-post-signoff{
      font-weight: 600;
      color: #6d50ba;
    }

    @media (max-width: 640px){
      .cc-post-body{
        padding: 26px 18px 32px;
      }

      .cc-post-wrap{
        padding: 24px 12px 56px;
      }
    }
  </style>
</head>
