    html, body{
      margin:0;
      padding:0;
    }

    body.nv-y2k.home-spring{
      background:
        radial-gradient(circle at top left, rgba(255, 223, 205, 0.96) 0%, transparent 34%),
        radial-gradient(circle at top right, rgba(255, 198, 214, 0.80) 0%, transparent 30%),
        radial-gradient(circle at bottom left, rgba(255, 188, 152, 0.34) 0%, transparent 28%),

      color: #4f3550;
    }

    #nav-placeholder{
      width:100%;
    }

    main{
      display:block;
    }

    .nv-page{
      padding: 18px 14px 44px;
    }

    .nv-wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 8px 16px 40px;
    }

    .nv-home-hero{
      margin-bottom: 28px;
    }

    .nv-home-hero-grid{
      display:grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap:20px;
      align-items:stretch;
    }

    .nv-home-hero-main,
    .nv-home-hero-side{
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.64);
      box-shadow: 0 18px 42px rgba(128, 72, 90, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nv-home-hero-main{
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(135deg, rgba(255,191,160,0.22), rgba(255,170,192,0.16));
    }

    .nv-home-hero-side{
      padding: 24px 22px;
      background: rgba(255,255,255,0.76);
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
    }

    .nv-home-hero-main{
      margin-bottom: 16px;
    }

    .nv-home-hero-image{
      width:100%;
      display:block;
      border-radius:24px;
      margin-bottom:16px;
    }

    .nv-home-hero-actions{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:12px;
    }

    .nv-freebie-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:56px;
      padding:14px 22px;
      border-radius:999px;
      background:linear-gradient(135deg, #ff9d7d, #ff8fb1, #ffbd94);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      line-height:1.2;
      border:1px solid rgba(255,255,255,0.34);
      box-shadow:0 12px 28px rgba(255,143,177,0.22);
      transition:all 0.2s ease;
    }

    .nv-freebie-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 32px rgba(255,143,177,0.28);
    }

    .home-spring .nv-btn.primary{
      color:#fff;
      background:linear-gradient(135deg, #ff9d7d, #ff8fb1, #ffbd94);
      border:1px solid rgba(255,255,255,0.34);

    .home-spring .nv-btn.ghost{

      background:rgba(255,255,255,0.84);
      border:1px solid rgba(255,255,255,0.72);
      box-shadow:0 10px 24px rgba(148,95,112,0.08);
    }

    .nv-founder-photo{

      font-weight:700;

    }

    .nv-founder-text{

      line-height:1.72;
      font-size:0.98rem;
    }

    .nv-founder-actions{
      display:flex;
      flex-direction:column;

      margin-top:6px;
    }

    .nv-social-float-wrap{
      max-width:1100px;
      margin:32px auto 0;
      padding:0 16px;
      display:flex;
      justify-content:center;
    }

    .nv-social-float{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      gap:10px;
      width:auto;
      max-width:100%;
      padding:10px 14px;
      background:rgba(255,255,255,0.50);
      border:1px solid rgba(255,255,255,0.66);
      border-radius:999px;
      box-shadow:0 10px 24px rgba(128,72,90,0.08);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .nv-social-float-link{
      width:36px;
      height:36px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      text-decoration:none;
      background:rgba(255,255,255,0.90);
      border:1px solid rgba(255,255,255,0.78);
      box-shadow:0 6px 16px rgba(128,72,90,0.08);
      transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;

    .nv-social-float-link:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(128,72,90,0.14);
      background:#ffffff;
    }

    .nv-social-float img{
      width:18px;
      height:18px;
      object-fit:contain;
      display:block;
    }

    .nv-footer{
      margin-top:30px;
      padding:20px 0 48px;
      text-align:center;
      color:#7a6771;
      font-size:0.95rem;
    }

    @media (max-width: 900px){

      .nv-home-hero-side{

    }

    @media (max-width:720px){

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
    fetch("/components/nav.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("nav-placeholder").innerHTML = data;

        const toggle = document.getElementById("nv-menu-toggle");
        const nav = document.getElementById("nv-nav");

        if (toggle && nav) {
          toggle.addEventListener("click", () => {
            const open = nav.classList.toggle("active");
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
          });

          document.addEventListener("click", (e) => {
            if (!toggle.contains(e.target) && !nav.contains(e.target)) {
              nav.classList.remove("active");
              toggle.setAttribute("aria-expanded", "false");
            }
          });
        }
      })
      .catch(err => console.error("Nav load error:", err));
  </script>
